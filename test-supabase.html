<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 연결 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
        }
        #output {
            background: #f5f5f5;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Supabase 연결 테스트</h1>

    <div>
        <button onclick="testConnection()">1. 연결 테스트</button>
        <button onclick="testSelect()">2. 데이터 조회</button>
        <button onclick="testInsert()">3. 데이터 추가</button>
        <button onclick="testDelete()">4. 테스트 데이터 삭제</button>
    </div>

    <div id="output"></div>

    <script>
        const SUPABASE_URL = 'https://gakynwqgyqnljcipchrb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdha3lud3FneXFubGpjaXBjaHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjcyMjYsImV4cCI6MjA5NzI0MzIyNn0.5n96o1YYVwDcV5eOe9EDAKD1KUA0QMORrR3oClVsAEc';

        const output = document.getElementById('output');

        function log(message, type = 'info') {
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            output.innerHTML += `<div class="${className}">${new Date().toLocaleTimeString()} - ${message}</div>`;
            console.log(message);
        }

        function clear() {
            output.innerHTML = '';
        }

        async function testConnection() {
            clear();
            log('=== Supabase 연결 테스트 시작 ===');

            try {
                if (typeof window.supabase === 'undefined') {
                    log('❌ Supabase 라이브러리가 로드되지 않았습니다.', 'error');
                    return;
                }

                log('✓ Supabase 라이브러리 로드됨', 'success');

                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log('✓ Supabase 클라이언트 생성 완료', 'success');

                // 테이블 존재 여부 확인
                const { data, error } = await supabase
                    .from('todos')
                    .select('count')
                    .limit(0);

                if (error) {
                    log('❌ 에러 발생:', 'error');
                    log(JSON.stringify(error, null, 2), 'error');

                    if (error.message.includes('relation "public.todos" does not exist')) {
                        log('→ todos 테이블이 존재하지 않습니다. SQL Editor에서 테이블을 생성하세요.', 'error');
                    } else if (error.code === '42501') {
                        log('→ RLS 정책 문제입니다. 정책을 확인하세요.', 'error');
                    }
                    return;
                }

                log('✓ todos 테이블 접근 성공!', 'success');
                log('연결 테스트 완료!', 'success');

            } catch (err) {
                log('❌ 예외 발생: ' + err.message, 'error');
                log(err.stack, 'error');
            }
        }

        async function testSelect() {
            clear();
            log('=== 데이터 조회 테스트 ===');

            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const { data, error } = await supabase
                    .from('todos')
                    .select('*')
                    .order('order', { ascending: true });

                if (error) {
                    log('❌ 조회 실패:', 'error');
                    log(JSON.stringify(error, null, 2), 'error');
                    return;
                }

                log('✓ 조회 성공!', 'success');
                log(`총 ${data.length}개의 항목이 있습니다.`);

                if (data.length > 0) {
                    log('\n데이터:');
                    log(JSON.stringify(data, null, 2));
                } else {
                    log('테이블이 비어있습니다.');
                }

            } catch (err) {
                log('❌ 예외 발생: ' + err.message, 'error');
            }
        }

        async function testInsert() {
            clear();
            log('=== 데이터 추가 테스트 ===');

            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const testData = {
                    text: '테스트 할 일 - ' + new Date().toLocaleTimeString(),
                    priority: 'medium',
                    completed: false,
                    order: Math.floor(Math.random() * 1000000)
                };

                log('추가할 데이터:');
                log(JSON.stringify(testData, null, 2));

                const { data, error } = await supabase
                    .from('todos')
                    .insert([testData])
                    .select();

                if (error) {
                    log('❌ 추가 실패:', 'error');
                    log(JSON.stringify(error, null, 2), 'error');

                    if (error.code === '42501') {
                        log('→ RLS 정책에서 INSERT를 허용하지 않습니다.', 'error');
                        log('→ "Allow public insert access" 정책이 있는지 확인하세요.', 'error');
                    }
                    return;
                }

                log('✓ 추가 성공!', 'success');
                log('추가된 데이터:');
                log(JSON.stringify(data, null, 2), 'success');

            } catch (err) {
                log('❌ 예외 발생: ' + err.message, 'error');
            }
        }

        async function testDelete() {
            clear();
            log('=== 테스트 데이터 삭제 ===');

            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // "테스트 할 일"로 시작하는 모든 항목 삭제
                const { data, error } = await supabase
                    .from('todos')
                    .delete()
                    .like('text', '테스트 할 일%')
                    .select();

                if (error) {
                    log('❌ 삭제 실패:', 'error');
                    log(JSON.stringify(error, null, 2), 'error');
                    return;
                }

                log('✓ 삭제 성공!', 'success');
                log(`${data.length}개의 테스트 항목이 삭제되었습니다.`);

            } catch (err) {
                log('❌ 예외 발생: ' + err.message, 'error');
            }
        }

        // 페이지 로드 시 자동으로 연결 테스트
        window.addEventListener('load', () => {
            log('페이지 로드 완료. "1. 연결 테스트" 버튼을 클릭하세요.');
        });
    </script>
</body>
</html>
