<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 할 일 - 로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
            <h1 class="auth-title">오늘 할 일</h1>

            <!-- 탭 -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">로그인</button>
                <button class="auth-tab" data-tab="signup">회원가입</button>
            </div>

            <!-- 로그인 폼 -->
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">이메일</label>
                    <input type="email" id="login-email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button id="login-btn" class="auth-button">로그인</button>
            </div>

            <!-- 회원가입 폼 -->
            <div id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="signup-email">이메일</label>
                    <input type="email" id="signup-email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">비밀번호</label>
                    <input type="password" id="signup-password" placeholder="최소 6자 이상" required>
                </div>
                <div class="form-group">
                    <label for="signup-password-confirm">비밀번호 확인</label>
                    <input type="password" id="signup-password-confirm" placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                <button id="signup-btn" class="auth-button">회원가입</button>
            </div>

            <!-- 에러 메시지 -->
            <div id="auth-error" class="auth-error hidden"></div>
        </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
